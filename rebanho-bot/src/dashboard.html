<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebanho Bovino — Grupo Ricci</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; }

  header {
    background: #0f6e56;
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header span { font-size: 13px; opacity: 0.8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .kpi {
    background: #fff;
    border-radius: 12px;
    padding: 20px 22px;
    border: 1px solid #e0ded8;
  }
  .kpi .label { font-size: 12px; color: #5f5e5a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
  .kpi .valor { font-size: 28px; font-weight: 700; color: #0f6e56; }
  .kpi .sub { font-size: 12px; color: #888; margin-top: 4px; }

  .charts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }
  @media (max-width: 700px) { .charts { grid-template-columns: 1fr; } }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #e0ded8;
  }
  .card h2 { font-size: 14px; font-weight: 600; color: #3d3d3a; margin-bottom: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; background: #f1efe8; color: #5f5e5a; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 9px 10px; border-bottom: 1px solid #f1efe8; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf7; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-m { background: #e6f1fb; color: #0c447c; }
  .badge-f { background: #fbeaf0; color: #72243e; }

  .loading { text-align: center; padding: 60px; color: #888; font-size: 14px; }
  .erro { color: #a32d2d; background: #fcebeb; padding: 12px 16px; border-radius: 8px; font-size: 13px; }

  .periodo-sel { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
  .periodo-sel label { font-size: 13px; color: #5f5e5a; }
  .periodo-sel select {
    padding: 6px 10px; border-radius: 6px; border: 1px solid #d3d1c7;
    font-size: 13px; background: #fff; cursor: pointer;
  }
  .atualizar {
    margin-left: auto;
    padding: 6px 14px;
    background: #0f6e56;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .atualizar:hover { background: #085041; }
</style>
</head>
<body>
<header>
  <h1>Mapa de Rebanho Bovino</h1>
  <span id="ultima-atualizacao">Carregando...</span>
</header>

<div class="container">

  <div class="periodo-sel">
    <label>Exibir últimos:</label>
    <select id="sel-meses" onchange="carregarDados()">
      <option value="6">6 meses</option>
      <option value="12" selected>12 meses</option>
      <option value="24">24 meses</option>
    </select>
    <button class="atualizar" onclick="carregarDados()">Atualizar</button>
  </div>

  <div id="kpis" class="kpis">
    <div class="loading">Carregando dados...</div>
  </div>

  <div class="charts">
    <div class="card">
      <h2>Evolução do rebanho total</h2>
      <canvas id="chart-evolucao" height="220"></canvas>
    </div>
    <div class="card">
      <h2>Nascimentos vs mortes</h2>
      <canvas id="chart-nasc-mort" height="220"></canvas>
    </div>
  </div>

  <div class="card">
    <h2>Histórico mensal detalhado</h2>
    <div id="tabela-container"><div class="loading">Carregando...</div></div>
  </div>

</div>

<script>
const API_BASE = window.location.origin

const MESES = ['', 'Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun',
               'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez']

let chartEvolucao = null
let chartNascMort = null

async function carregarDados() {
  const meses = document.getElementById('sel-meses').value
  try {
    const resp = await fetch(`${API_BASE}/api/resumo?meses=${meses}`)
    const json = await resp.json()
    if (!json.ok) throw new Error(json.error)
    renderizar(json.data)
  } catch (err) {
    document.getElementById('kpis').innerHTML =
      `<div class="erro">Erro ao carregar: ${err.message}</div>`
  }
}

function renderizar(dados) {
  if (!dados || dados.length === 0) {
    document.getElementById('kpis').innerHTML =
      '<div class="loading">Nenhum dado disponível ainda.</div>'
    return
  }

  const ultimo = dados[0]
  const anterior = dados[1]
  const diff = anterior
    ? Number(ultimo.total_rebanho) - Number(anterior.total_rebanho)
    : null

  // KPIs
  document.getElementById('kpis').innerHTML = `
    <div class="kpi">
      <div class="label">Rebanho atual</div>
      <div class="valor">${Number(ultimo.total_rebanho).toLocaleString('pt-BR')}</div>
      <div class="sub">${MESES[ultimo.mes]}/${ultimo.ano}${diff !== null ? ` | ${diff >= 0 ? '+' : ''}${diff} vs mês ant.` : ''}</div>
    </div>
    <div class="kpi">
      <div class="label">Machos</div>
      <div class="valor">${Number(ultimo.total_machos).toLocaleString('pt-BR')}</div>
      <div class="sub">${((ultimo.total_machos / ultimo.total_rebanho) * 100).toFixed(1)}% do rebanho</div>
    </div>
    <div class="kpi">
      <div class="label">Fêmeas</div>
      <div class="valor">${Number(ultimo.total_femeas).toLocaleString('pt-BR')}</div>
      <div class="sub">${((ultimo.total_femeas / ultimo.total_rebanho) * 100).toFixed(1)}% do rebanho</div>
    </div>
    <div class="kpi">
      <div class="label">Nascimentos</div>
      <div class="valor">${ultimo.total_nascimentos}</div>
      <div class="sub">${MESES[ultimo.mes]}/${ultimo.ano}</div>
    </div>
    <div class="kpi">
      <div class="label">Mortalidade</div>
      <div class="valor">${Number(ultimo.mortalidade_pct).toFixed(3)}%</div>
      <div class="sub">${ultimo.total_mortes} mortes</div>
    </div>
    <div class="kpi">
      <div class="label">Vendas</div>
      <div class="valor">${ultimo.total_vendas}</div>
      <div class="sub">${MESES[ultimo.mes]}/${ultimo.ano}</div>
    </div>
  `

  // Dados dos gráficos (ordem cronológica)
  const ordenado = [...dados].reverse()
  const labels = ordenado.map((d) => `${MESES[d.mes]}/${String(d.ano).slice(2)}`)
  const totais = ordenado.map((d) => Number(d.total_rebanho))
  const nasc = ordenado.map((d) => Number(d.total_nascimentos))
  const mortes = ordenado.map((d) => Number(d.total_mortes))

  // Gráfico evolução
  if (chartEvolucao) chartEvolucao.destroy()
  chartEvolucao = new Chart(document.getElementById('chart-evolucao'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Total',
        data: totais,
        borderColor: '#0f6e56',
        backgroundColor: 'rgba(15,110,86,0.08)',
        fill: true,
        tension: 0.3,
        pointRadius: 4,
      }],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: false, ticks: { font: { size: 11 } } },
        x: { ticks: { font: { size: 11 } } },
      },
    },
  })

  // Gráfico nascimentos vs mortes
  if (chartNascMort) chartNascMort.destroy()
  chartNascMort = new Chart(document.getElementById('chart-nasc-mort'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Nascimentos', data: nasc, backgroundColor: '#5DCAA5' },
        { label: 'Mortes', data: mortes, backgroundColor: '#D85A30' },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } },
      scales: {
        y: { beginAtZero: true, ticks: { font: { size: 11 } } },
        x: { ticks: { font: { size: 11 } } },
      },
    },
  })

  // Tabela
  const linhas = dados.map((d) => `
    <tr>
      <td>${MESES[d.mes]}/${d.ano}</td>
      <td>${Number(d.total_rebanho).toLocaleString('pt-BR')}</td>
      <td><span class="badge badge-m">${Number(d.total_machos).toLocaleString('pt-BR')}</span></td>
      <td><span class="badge badge-f">${Number(d.total_femeas).toLocaleString('pt-BR')}</span></td>
      <td>${d.total_nascimentos}</td>
      <td>${d.total_compras}</td>
      <td>${d.total_vendas}</td>
      <td>${d.total_mortes}</td>
      <td>${Number(d.mortalidade_pct).toFixed(3)}%</td>
    </tr>
  `).join('')

  document.getElementById('tabela-container').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Período</th>
          <th>Total</th>
          <th>Machos</th>
          <th>Fêmeas</th>
          <th>Nasc.</th>
          <th>Compras</th>
          <th>Vendas</th>
          <th>Mortes</th>
          <th>Mortalidade</th>
        </tr>
      </thead>
      <tbody>${linhas}</tbody>
    </table>
  `

  document.getElementById('ultima-atualizacao').textContent =
    `Atualizado: ${new Date().toLocaleString('pt-BR')}`
}

carregarDados()
</script>
</body>
</html>
