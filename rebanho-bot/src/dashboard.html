<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebanho Bovino — Grupo Ricci</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde: #0f6e56; --verde2: #085041; --verde-light: #e6f5f0;
    --amber: #d97706; --amber-light: #fef3c7;
    --red: #dc2626; --red-light: #fee2e2;
    --blue: #1d4ed8; --blue-light: #dbeafe;
    --bg: #f4f3ee; --card: #fff; --border: #e0ded8;
    --text: #1a1a18; --muted: #6b6b67;
  }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
  header {
    background: var(--verde); color: #fff; padding: 16px 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  select#selMeses {
    padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,.3);
    background: rgba(255,255,255,.15); color: #fff; font-size: 13px; cursor: pointer;
  }
  select#selMeses option { color: #000; background: #fff; }
  .btn-refresh {
    padding: 6px 14px; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.3);
    color: #fff; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  .btn-refresh:hover { background: rgba(255,255,255,.3); }
  #ultima-att { font-size: 11px; opacity: .7; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  /* ALERTAS */
  #alertas { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .alerta {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  }
  .alerta-red { background: var(--red-light); color: var(--red); border: 1px solid #fca5a5; }
  .alerta-amber { background: var(--amber-light); color: var(--amber); border: 1px solid #fcd34d; }
  .alerta-verde { background: var(--verde-light); color: var(--verde); border: 1px solid #6ee7b7; }

  /* KPIs */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .kpi { background: var(--card); border-radius: 12px; padding: 18px 20px; border: 1px solid var(--border); }
  .kpi .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .kpi .valor { font-size: 26px; font-weight: 700; color: var(--verde); }
  .kpi .delta { font-size: 12px; margin-top: 4px; }
  .delta-up { color: var(--verde); } .delta-down { color: var(--red); } .delta-neu { color: var(--muted); }

  /* COMPARAÇÃO */
  .comparacao {
    background: var(--card); border-radius: 12px; border: 1px solid var(--border);
    padding: 20px; margin-bottom: 24px;
  }
  .comparacao h2 { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: .04em; }
  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .comp-col h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
  .comp-col.atual h3 { border-color: var(--verde); color: var(--verde); }
  .comp-col.anterior h3 { border-color: var(--muted); color: var(--muted); }
  .comp-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid var(--bg); }
  .comp-row .comp-label { color: var(--muted); }
  .comp-row .comp-val { font-weight: 600; }

  /* GRID DE GRÁFICOS */
  .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } .comp-grid { grid-template-columns: 1fr; } }
  .chart-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
  .chart-card h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 16px; }
  .chart-card canvas { max-height: 260px; }

  /* MOVIMENTAÇÕES */
  .mov-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .mov-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 14px 16px; }
  .mov-card .mov-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .mov-card .mov-val { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .mov-nasc .mov-val { color: var(--verde); }
  .mov-comp .mov-val { color: var(--blue); }
  .mov-vend .mov-val { color: var(--amber); }
  .mov-mort .mov-val { color: var(--red); }
  .mov-transf .mov-val { color: #7c3aed; }

  /* TABELA CATEGORIAS */
  .table-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
  .table-card-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .table-card-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .tab-btns { display: flex; gap: 6px; }
  .tab-btn { padding: 4px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: #fff; }
  .tab-btn.active { background: var(--verde); color: #fff; border-color: var(--verde); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 8px 14px; background: var(--bg); color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 9px 14px; border-bottom: 1px solid var(--bg); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf7; }
  .badge-m { background: #dbeafe; color: #1d4ed8; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .badge-f { background: #fce7f3; color: #be185d; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
  .mort-ok { color: var(--verde); font-weight: 600; }
  .mort-warn { color: var(--amber); font-weight: 600; }
  .mort-high { color: var(--red); font-weight: 600; }

  /* HISTÓRICO */
  .hist-table { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .hist-table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .hist-table-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .erro { background: var(--red-light); color: var(--red); padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

  /* Drill-down histórico */
  .hist-mes-row { cursor: pointer; user-select: none; transition: background .15s; }
  .hist-mes-row:hover td { background: #f0faf6 !important; }
  .hist-mes-row td:first-child::before { content: '▶ '; font-size: 10px; color: var(--verde); transition: transform .2s; display: inline-block; }
  .hist-mes-row.aberto td:first-child::before { content: '▼ '; }
  .hist-dia-row { background: #fafaf7; display: none; }
  .hist-dia-row.visivel { display: table-row; }
  .hist-dia-row td:first-child { padding-left: 28px; color: var(--muted); font-size: 11px; }
  .hist-dia-row td { font-size: 12px; border-bottom: 1px solid var(--bg); }
  .sem-dias { text-align:center; color: var(--muted); font-size: 11px; font-style: italic; }


  .mov-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; }
  .mov-entrada { background:#e6f4ea; color:#1e7e34; }
  .mov-saida   { background:#fdecea; color:#c62828; }
  .mov-transf  { background:#e8f0fe; color:#1a56db; }
  .mov-peso    { background:#fff3e0; color:#e65100; }


  .busca-container { margin:24px 0; }
  .busca-box { display:flex; gap:8px; align-items:center; }
  .busca-input { flex:1; padding:12px 16px; border-radius:12px; border:2px solid var(--verde-claro); background:var(--card); color:var(--text); font-size:14px; outline:none; transition:border-color .2s; }
  .busca-input:focus { border-color:var(--verde); }
  .busca-input::placeholder { color:var(--muted); }
  .busca-btn { padding:12px 20px; background:var(--verde); color:#fff; border:none; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; }
  .busca-btn:disabled { opacity:.5; cursor:not-allowed; }
  .busca-resposta { margin-top:12px; padding:16px; background:var(--card); border-radius:12px; border-left:4px solid var(--verde); font-size:14px; line-height:1.6; display:none; }
  .busca-resposta.visivel { display:block; }
  .anom-card { padding:12px 16px; border-radius:10px; margin-bottom:8px; display:flex; align-items:flex-start; gap:10px; }
  .anom-critica { background:#fdecea; border-left:4px solid #c62828; }
  .anom-alta    { background:#fff3e0; border-left:4px solid #e65100; }
  .anom-media   { background:#fffde7; border-left:4px solid #f9a825; }
  .anom-baixa   { background:#f1f8e9; border-left:4px solid #558b2f; }
  .anom-icon { font-size:18px; margin-top:1px; }
  .anom-msg { font-size:13px; line-height:1.5; }
  .anom-badge { display:inline-block; padding:1px 7px; border-radius:8px; font-size:10px; font-weight:700; text-transform:uppercase; margin-right:6px; }
  .badge-critica { background:#c62828; color:#fff; }
  .badge-alta    { background:#e65100; color:#fff; }
  .badge-media   { background:#f9a825; color:#fff; }
  .badge-baixa   { background:#558b2f; color:#fff; }

  .sem-dados { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>🐄 Mapa de Rebanho — Grupo Ricci</h1>
  <div class="header-right">
    <select id="selMeses" onchange="carregar()">
      <option value="3">3 meses</option>
      <option value="6">6 meses</option>
      <option value="12" selected>12 meses</option>
      <option value="24">24 meses</option>
      <option value="36">36 meses</option>
    </select>
    <select id="selMesRef" onchange="mudarMesRef()" title="Mês de referência para KPIs" style="background:var(--card);color:var(--text);border:1px solid #d1fae5;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;margin-right:8px">
      <option value="">Mês mais recente</option>
    </select>
    <button class="btn-refresh" onclick="carregar()">↻ Atualizar</button>
    <span id="ultima-att"></span>
  </div>
</header>

<div class="container">
  
  <div class="busca-container">
    <div class="busca-box">
      <input type="text" id="buscaInput" class="busca-input"
        placeholder="🔍 Pergunte sobre o rebanho... ex: qual a mortalidade em março? quantos machos temos?"
        onkeydown="if(event.key==='Enter') executarBusca()" />
      <button class="busca-btn" onclick="executarBusca()" id="buscaBtn">Buscar</button>
    </div>
    <div class="busca-resposta" id="buscaResposta"></div>
  </div>


  <div id="anomalias-section" style="margin-top:16px;display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <h2 style="margin:0;font-size:16px">⚠️ Anomalias Detectadas</h2>
      <button onclick="reanalizar()" style="font-size:11px;padding:4px 10px;background:var(--verde);color:#fff;border:none;border-radius:8px;cursor:pointer">🔄 Reanalisar</button>
    </div>
    <div id="anomalias-lista"></div>
  </div>
  <div class="busca-container">
    <div class="busca-box">
      <input type="text" id="buscaInput" class="busca-input" placeholder="🔍 Pergunte sobre o rebanho..." onkeydown="if(event.key==='Enter') executarBusca()" />
      <button class="busca-btn" onclick="executarBusca()" id="buscaBtn">Buscar</button>
    </div>
    <div class="busca-resposta" id="buscaResposta"></div>
  </div>

<div id="alertas"></div>
  <div id="kpis" class="kpis"><div class="loading">Carregando...</div></div>
  <div id="comparacao" class="comparacao" style="display:none"></div>
  <div class="charts-grid">
    <div class="chart-card"><h2>Evolução do Rebanho</h2><canvas id="chartEvolucao"></canvas></div>
    <div class="chart-card"><h2>Machos vs Fêmeas</h2><canvas id="chartPizza"></canvas></div>
  </div>
  <div class="chart-card" style="margin-bottom:24px"><h2>Movimentações Mensais</h2><canvas id="chartMov" style="max-height:200px"></canvas></div>
  <div id="movCards" class="mov-grid"></div>
  <div id="tabelaCat" class="table-card"></div>
  <div id="historico" class="hist-table" style="margin-top:24px"></div>
  <div id="movimentacoes" class="hist-table" style="margin-top:24px"></div>
</div>

<script>
const API = window.location.origin
const MESES = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']
const MESES_FULL = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
let chartEv, chartPz, chartMv
let dadosGlobais = []
let filtroCat = 'todos'
let mesRefIndex = 0

function mudarMesRef() {
  mesRefIndex = parseInt(document.getElementById('selMesRef').value) || 0
  if (!dadosGlobais.length) return
  const d = dadosGlobais[mesRefIndex] || dadosGlobais[0]
  renderKPIs(dadosGlobais)
  renderComparacao(dadosGlobais)
  renderChartPizza(d)
  renderMovCards(d)
  renderTabelaCat(d)
}

function popularSelMesRef(dados) {
  const sel = document.getElementById('selMesRef')
  const MB = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']
  sel.innerHTML = '<option value="">Mês mais recente</option>'
  dados.forEach(function(d, i) {
    var opt = document.createElement('option')
    opt.value = i
    opt.textContent = MB[d.mes] + '/' + d.ano + ' (' + Number(d.total_rebanho).toLocaleString('pt-BR') + ' cab)'
    if (i === mesRefIndex) opt.selected = true
    sel.appendChild(opt)
  })
}

async function carregar() {
  const lim = document.getElementById('selMeses').value
  try {
    const r = await fetch(`${API}/api/resumo?meses=${lim}`)
    const j = await r.json()
    if (!j.ok) throw new Error(j.error)
    dadosGlobais = j.data || []
    if (!dadosGlobais.length) {
      document.getElementById('kpis').innerHTML = '<div class="sem-dados">Nenhum dado disponível ainda. Envie um áudio pelo WhatsApp!</div>'
      return
    }
    popularSelMesRef(dadosGlobais)
    renderAlertas(dadosGlobais)
    renderKPIs(dadosGlobais)
    renderComparacao(dadosGlobais)
    renderChartEvolucao(dadosGlobais)
    renderChartPizza(dadosGlobais[0])
    renderChartMov(dadosGlobais)
    renderMovCards(dadosGlobais[0])
    renderTabelaCat(dadosGlobais[0])
    renderHistorico(dadosGlobais)
    atualizarEstilos()
    carregarAnomalias(false).catch(function(){})
    try { var rMov = await fetch(API + '/api/movimentacoes?limite=50'); var jMov = await rMov.json(); renderMovimentacoes(jMov.data || []) } catch(_) {}
    document.getElementById('ultima-att').textContent = `Atualizado: ${new Date().toLocaleTimeString('pt-BR')}`
  } catch(e) {
    document.getElementById('kpis').innerHTML = `<div class="erro">Erro: ${e.message}</div>`
  }
}

function renderAlertas(dados) {
  const d = dados[0]
  if (!d) return
  const alertas = []
  const mort = parseFloat(d.mortalidade_pct) || 0
  if (mort > 2) alertas.push({ tipo: 'red', msg: `⚠️ Mortalidade alta em ${MESES_FULL[d.mes]}/${d.ano}: ${mort.toFixed(3)}% (acima de 2%)` })
  else if (mort > 1) alertas.push({ tipo: 'amber', msg: `⚠️ Mortalidade moderada em ${MESES_FULL[d.mes]}/${d.ano}: ${mort.toFixed(3)}%` })

  if (dados.length >= 2) {
    const prev = dados[1]
    const varPct = prev.total_rebanho > 0 ? ((d.total_rebanho - prev.total_rebanho) / prev.total_rebanho * 100) : 0
    if (varPct < -5) alertas.push({ tipo: 'red', msg: `📉 Rebanho reduziu ${Math.abs(varPct).toFixed(1)}% em relação ao mês anterior` })
    else if (varPct > 10) alertas.push({ tipo: 'verde', msg: `📈 Rebanho cresceu ${varPct.toFixed(1)}% em relação ao mês anterior` })
  }

  if (!alertas.length) alertas.push({ tipo: 'verde', msg: '✅ Indicadores normais — rebanho saudável' })

  document.getElementById('alertas').innerHTML = alertas.map(a =>
    `<div class="alerta alerta-${a.tipo}">${a.msg}</div>`).join('')
}

function renderKPIs(dados) {
  var idx = mesRefIndex || 0
  const d = dados[idx] || dados[0]
  const prev = dados[idx + 1] || null
  const delta = (campo) => {
    if (!prev) return ''
    const diff = Number(d[campo]) - Number(prev[campo])
    if (diff === 0) return `<div class="delta delta-neu">= igual ao mês ant.</div>`
    const sinal = diff > 0 ? '+' : ''
    const cls = diff > 0 ? 'delta-up' : 'delta-down'
    return `<div class="delta ${cls}">${sinal}${diff.toLocaleString('pt-BR')} vs mês ant.</div>`
  }
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="label">Rebanho Total</div><div class="valor">${Number(d.total_rebanho).toLocaleString('pt-BR')}</div>${delta('total_rebanho')}</div>
    <div class="kpi"><div class="label">Machos</div><div class="valor">${Number(d.total_machos).toLocaleString('pt-BR')}</div><div class="delta delta-neu">${(d.total_machos/d.total_rebanho*100).toFixed(1)}% do rebanho</div></div>
    <div class="kpi"><div class="label">Fêmeas</div><div class="valor">${Number(d.total_femeas).toLocaleString('pt-BR')}</div><div class="delta delta-neu">${(d.total_femeas/d.total_rebanho*100).toFixed(1)}% do rebanho</div></div>
    <div class="kpi"><div class="label">Nascimentos</div><div class="valor">${d.total_nascimentos}</div>${delta('total_nascimentos')}</div>
    <div class="kpi"><div class="label">Mortalidade</div><div class="valor" style="color:var(--verde)">${parseFloat(d.mortalidade_pct).toFixed(3)}%</div><div class="delta delta-neu">${d.total_mortes} mortes</div></div>
    <div class="kpi"><div class="label">Período</div><div class="valor" style="font-size:18px">${MESES_FULL[d.mes]}</div><div class="delta delta-neu">${d.ano}</div></div>
  `
}

function renderComparacao(dados) {
  var idx = mesRefIndex || 0
  if (dados.length < 2) { document.getElementById('comparacao').style.display='none'; return }
  const a = dados[idx] || dados[0]
  const b = dados[idx + 1] || dados[1]
  const el = document.getElementById('comparacao')
  el.style.display = 'block'
  const row = (label, campoA, campoB) => {
    const va = Number(a[campoA] || 0), vb = Number(b[campoB || campoA] || 0)
    return `<div class="comp-row"><span class="comp-label">${label}</span><span class="comp-val">${va.toLocaleString('pt-BR')}</span></div>
            <div class="comp-row"><span class="comp-label">${label}</span><span class="comp-val">${vb.toLocaleString('pt-BR')}</span></div>`
  }
  el.innerHTML = `
    <h2>Comparação Mês Atual vs Anterior</h2>
    <div class="comp-grid">
      <div class="comp-col atual">
        <h3>${MESES_FULL[a.mes]}/${a.ano} (atual)</h3>
        ${[['Total rebanho','total_rebanho'],['Machos','total_machos'],['Fêmeas','total_femeas'],
           ['Nascimentos','total_nascimentos'],['Compras','total_compras'],['Vendas','total_vendas'],
           ['Mortes','total_mortes'],['Mortalidade','mortalidade_pct']].map(([l,c]) =>
          `<div class="comp-row"><span class="comp-label">${l}</span><span class="comp-val">${c==='mortalidade_pct'?parseFloat(a[c]).toFixed(3)+'%':Number(a[c]||0).toLocaleString('pt-BR')}</span></div>`).join('')}
      </div>
      <div class="comp-col anterior">
        <h3>${MESES_FULL[b.mes]}/${b.ano} (anterior)</h3>
        ${[['Total rebanho','total_rebanho'],['Machos','total_machos'],['Fêmeas','total_femeas'],
           ['Nascimentos','total_nascimentos'],['Compras','total_compras'],['Vendas','total_vendas'],
           ['Mortes','total_mortes'],['Mortalidade','mortalidade_pct']].map(([l,c]) =>
          `<div class="comp-row"><span class="comp-label">${l}</span><span class="comp-val">${c==='mortalidade_pct'?parseFloat(b[c]).toFixed(3)+'%':Number(b[c]||0).toLocaleString('pt-BR')}</span></div>`).join('')}
      </div>
    </div>`
}

function renderChartEvolucao(dados) {
  const ord = [...dados].reverse()
  const labels = ord.map(d => `${MESES[d.mes]}/${String(d.ano).slice(2)}`)
  if (chartEv) chartEv.destroy()
  chartEv = new Chart(document.getElementById('chartEvolucao'), {
    type: 'line',
    data: { labels, datasets: [

    document.getElementById('tabelaCat').innerHTML = `

// Cache de dias por mês já carregados
const cacheHistDias = {}

function renderHistorico(dados) {
  const mesesMap = {}
  dados.forEach(d => {
    const key = d.ano + '-' + d.mes
    if (!mesesMap[key]) mesesMap[key] = { mes: d.mes, ano: d.ano, registros: [] }
    mesesMap[key].registros.push(d)
  })
  const meses = Object.values(mesesMap).sort((a,b) => b.ano - a.ano || b.mes - a.mes)

  const linhas = meses.map(m => {
    const total  = m.registros.reduce((s,r) => s + Number(r.total_rebanho||0), 0)
    const machos = m.registros.reduce((s,r) => s + Number(r.total_machos||0), 0)
    const femeas = m.registros.reduce((s,r) => s + Number(r.total_femeas||0), 0)
    const nasc   = m.registros.reduce((s,r) => s + Number(r.total_nascimentos||0), 0)
    const comp   = m.registros.reduce((s,r) => s + Number(r.total_compras||0), 0)
    const vend   = m.registros.reduce((s,r) => s + Number(r.total_vendas||0), 0)
    const mort   = m.registros.reduce((s,r) => s + Number(r.total_mortes||0), 0)
    const mortPct = total > 0 ? (mort/total*100).toFixed(3) : '0.000'
    const key    = m.ano + '-' + m.mes
    const periodo = MESES_FULL[m.mes] + '/' + m.ano
    const mortCls = parseFloat(mortPct) > 1 ? 'mort-high' : 'mort-ok'
    var r = ''
    r += '<tr class="hist-mes-row" data-key="' + key + '" data-mes="' + m.mes + '" data-ano="' + m.ano + '" id="mes-row-' + key + '">'
    r += '<td><strong>' + periodo + '</strong></td>'
    r += '<td>' + total.toLocaleString("pt-BR") + '</td>'
    r += '<td>' + machos.toLocaleString("pt-BR") + '</td>'
    r += '<td>' + femeas.toLocaleString("pt-BR") + '</td>'
    r += '<td>' + nasc + '</td><td>' + comp + '</td><td>' + vend + '</td><td>' + mort + '</td>'
    r += '<td class="' + mortCls + '">' + mortPct + '%</td>'
    r += '</tr>'
    r += '<tr class="hist-dia-row" id="dias-row-' + key + '">'
    r += '<td colspan="9"><div id="dias-inner-' + key + '" style="padding:4px 8px"><em class="sem-dias">Carregando...</em></div></td>'
    r += '</tr>'
    return r
  }).join('')

  document.getElementById('historico').innerHTML =
    '<div class="hist-table-header"><h2>Histórico Completo <span style="font-size:11px;color:var(--muted);font-weight:400">— clique no mês para ver os dias</span></h2></div>' +
    '<div style="overflow-x:auto"><table>' +
    '<thead><tr><th>Período</th><th>Total</th><th>Machos</th><th>Fêmeas</th>' +
    '<th>Nasc.</th><th>Compras</th><th>Vendas</th><th>Mortes</th><th>Mortalidade</th></tr></thead>' +
    '<tbody>' + linhas + '</tbody></table></div>'

  // Vincular eventos via addEventListener (sem inline onclick)
  document.querySelectorAll('.hist-mes-row').forEach(tr => {
    tr.addEventListener('click', () => {
      const key = tr.dataset.key
      const mes = parseInt(tr.dataset.mes)
      const ano = parseInt(tr.dataset.ano)
      toggleHistDias(key, mes, ano)
    })
  })
}

async function toggleHistDias(key, mes, ano) {
  const mesRow = document.getElementById('mes-row-' + key)
  const diasRow = document.getElementById('dias-row-' + key)
  const inner = document.getElementById('dias-inner-' + key)
  if (!mesRow || !diasRow) return

  const aberto = mesRow.classList.contains('aberto')
  if (aberto) {
    mesRow.classList.remove('aberto')
    diasRow.classList.remove('visivel')
    return
  }

  mesRow.classList.add('aberto')
  diasRow.classList.add('visivel')

  // Se já carregou, apenas mostrar
  if (cacheHistDias[key]) { renderDiasInner(key, cacheHistDias[key]); return }

  inner.innerHTML = '<em class="sem-dias">Carregando...</em>'

  try {
    const r = await fetch(API + '/api/resumo/dias?mes=' + mes + '&ano=' + ano)
    const j = await r.json()
    cacheHistDias[key] = j.data || []
    renderDiasInner(key, cacheHistDias[key])
  } catch(e) {
    inner.innerHTML = '<em class="sem-dias">Erro ao carregar: ' + e.message + '</em>'
  }
}

function renderDiasInner(key, dias) {
  const inner = document.getElementById('dias-inner-' + key)
  if (!inner) return

  if (!dias || dias.length === 0) {
    inner.innerHTML = '<em class="sem-dias">Sem registros diários para este mês</em>'
    return
  }

  const comDia = dias.filter(d => d.dia)
  if (comDia.length === 0) {
    inner.innerHTML = '<em class="sem-dias">Apenas total mensal — sem registros por dia</em>'
    return
  }

  const linhas = comDia.sort(function(a,b){ return a.dia - b.dia }).map(function(d) {
    var mortPct = parseFloat(d.mortalidade_pct||0).toFixed(3)
    var dataStr = String(d.dia).padStart(2,'0') + '/' + String(d.mes).padStart(2,'0') + '/' + d.ano
    var loteStr = (d.lote_nome && d.lote_nome !== 'Geral') ? ' [' + d.lote_nome + ']' : ''
    var mortCls = parseFloat(mortPct) > 1 ? 'mort-high' : 'mort-ok'
    var row = '<tr class="hist-dia-row visivel" style="background:#fafaf7">'
    row += '<td style="padding-left:28px;color:var(--muted);font-size:11px">' + dataStr + loteStr + '</td>'
    row += '<td>' + Number(d.total_rebanho).toLocaleString('pt-BR') + '</td>'
    row += '<td>' + Number(d.total_machos).toLocaleString('pt-BR') + '</td>'
    row += '<td>' + Number(d.total_femeas).toLocaleString('pt-BR') + '</td>'
    row += '<td>' + (d.total_nascimentos||0) + '</td>'
    row += '<td>' + (d.total_compras||0) + '</td>'
    row += '<td>' + (d.total_vendas||0) + '</td>'
    row += '<td>' + (d.total_mortes||0) + '</td>'
    row += '<td class="' + mortCls + '">' + mortPct + '%</td>'
    row += '</tr>'
    return row
  }).join('')

  // Inserir linhas <tr> diretamente na tabela, após a linha de dias
  var diasTr = inner.closest('tr')
  if (diasTr && diasTr.parentNode) {
    var tmp = document.createElement('tbody')
    tmp.innerHTML = linhas
    var ref = diasTr
    Array.from(tmp.querySelectorAll('tr')).forEach(function(tr) {
      ref.parentNode.insertBefore(tr, ref.nextSibling)
      ref = tr
    })
    inner.innerHTML = '<em class="sem-dias" style="font-size:11px">' + comDia.length + ' dia(s) registrado(s)</em>'
  } else {
    inner.innerHTML = linhas
  }
}

async function executarBusca() {
  var input = document.getElementById('buscaInput')
  var btn = document.getElementById('buscaBtn')
  var respDiv = document.getElementById('buscaResposta')
  var query = input.value.trim()
  if (!query) return
  btn.disabled = true
  btn.textContent = '⏳ Buscando...'
  respDiv.className = 'busca-resposta visivel'
  respDiv.innerHTML = '<em style="color:var(--muted)">Analisando com IA...</em>'
  try {
    var r = await fetch(API + '/api/busca', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ query }) })
    var j = await r.json()
    if (!j.ok) throw new Error(j.error)
    var html = '<strong>🤖 Resposta:</strong><br><br>' + j.resposta.replace(/\n/g, '<br>')
    if (j.exemplos_similares && j.exemplos_similares.length > 0) {
      html += '<div class="busca-similares"><br><strong>Registros similares:</strong><br>'
      html += j.exemplos_similares.map(function(e) { return '• ' + e.transcricao.substring(0,80) + (e.similaridade ? ' <span style="color:var(--verde)">(' + (e.similaridade*100).toFixed(0) + '% similar)</span>' : '') }).join('<br>')
      html += '</div>'
    }
    respDiv.innerHTML = html
  } catch(e) {
    respDiv.innerHTML = '<span style="color:#c62828">Erro: ' + e.message + '</span>'
  } finally {
    btn.disabled = false
    btn.textContent = 'Buscar'
  }
}

async function carregarAnomalias(forcar) {
  try {
    var r = await fetch(API + '/api/anomalias' + (forcar ? '?forcar=true' : ''))
    var j = await r.json()
    var lista = j.data || []
    var section = document.getElementById('anomalias-section')
    var el = document.getElementById('anomalias-lista')
    if (!lista.length) { section.style.display = 'none'; return }
    section.style.display = 'block'
    var ICONS = { critica:'🚨', alta:'⚠️', media:'⚡', baixa:'ℹ️' }
    el.innerHTML = lista.map(function(a) {
      return '<div class="anom-card anom-' + a.severidade + '"><span class="anom-icon">' + (ICONS[a.severidade]||'⚠️') + '</span><div class="anom-msg"><span class="anom-badge badge-' + a.severidade + '">' + a.severidade + '</span>' + a.mensagem + '</div></div>'

function renderMovimentacoes(dados) {
  var el = document.getElementById('movimentacoes')
  if (!el) return
  if (!dados || dados.length === 0) {
    el.innerHTML = '<div class="hist-table-header"><h2>Movimentações Recentes</h2></div><div class="sem-dados">Nenhuma movimentação registrada ainda.</div>'
    return
  }
  var LABEL = {entrada_compra:'Compra',saida_venda:'Venda',entrada_transferencia:'Transferência',saida_transferencia:'Transferência',saida_morte:'Morte',entrada_nascimento:'Nascimento',entrada_desmama:'Desmama',saida_desmama:'Desmama',pesagem:'Pesagem'}
  var CLS = {entrada_compra:'mov-entrada',entrada_nascimento:'mov-entrada',entrada_desmama:'mov-entrada',entrada_transferencia:'mov-transf',saida_venda:'mov-saida',saida_morte:'mov-saida',saida_desmama:'mov-saida',saida_transferencia:'mov-transf',pesagem:'mov-peso'}
  var linhas = dados.map(function(m) {
    var tipo = LABEL[m.tipo] || m.tipo || '-'
    var cls  = CLS[m.tipo] || 'mov-transf'
    var data = m.data_mov ? new Date(m.data_mov + 'T12:00:00').toLocaleDateString('pt-BR') : '-'
    var obs  = m.observacoes || ''
    var cat  = (obs.match(/Cat: ([^|]+)/) || [])[1] || '-'
    var resp = (obs.match(/Resp: ([^|]+)/) || [])[1] || ''
    var orig = (obs.match(/Origem: ([^|]+)/) || [])[1] || ''
    var dest = (obs.match(/Destino: ([^|]+)/) || [])[1] || ''
    return '<tr>' +
      '<td>' + data.trim() + '</td>' +
      '<td><span class="mov-badge ' + cls + '">' + tipo + '</span></td>' +
      '<td>' + (m.quantidade || '-') + '</td>' +
      '<td>' + cat.trim() + '</td>' +
      '<td style="font-size:11px">' + orig.trim() + (dest.trim() ? ' &rarr; ' + dest.trim() : '') + '</td>' +
      '<td style="color:var(--muted);font-size:11px">' + resp.trim() + '</td>' +
      '</tr>'
  }).join('')
  el.innerHTML = '<div class="hist-table-header"><h2>Movimentações Recentes <span style="font-size:11px;color:var(--muted);font-weight:400">— últimas 50</span></h2></div>' +
    '<div style="overflow-x:auto"><table>' +
    '<thead><tr><th>Data</th><th>Tipo</th><th>Qtd</th><th>Categoria</th><th>Origem / Destino</th><th>Responsável</th></tr></thead>' +
    '<tbody>' + linhas + '</tbody></table></div>'
}

// Atualizar classes de botões e mortalidade após render
function atualizarEstilos() {
  // Botões de filtro
  ['todos','M','F'].forEach(f => {
    const btn = document.getElementById('btn-' + f)
    if (btn) btn.className = 'tab-btn' + (filtroCat === f ? ' active' : '')
  })
  // Cor da mortalidade no histórico
  document.querySelectorAll('#td-mort').forEach(td => {
    const val = parseFloat(td.textContent)
    td.className = val > 2 ? 'mort-high' : val > 1 ? 'mort-warn' : 'mort-ok'
  })
  // Cor do KPI mortalidade
  const kpiMort = document.querySelector('#kpi-mort-val') 
  if (!kpiMort) {
    const kpis = document.querySelectorAll('.kpi .valor')
    kpis.forEach(el => {
      if (el.parentElement.querySelector('.label')?.textContent === 'Mortalidade') {
        const val = parseFloat(el.textContent)
        el.style.color = val > 1 ? 'var(--red)' : 'var(--verde)'
      }
    })
  }
}
